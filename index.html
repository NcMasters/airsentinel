<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirSentinel Dashboard</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: white;
            --text-color: #333;
            --btn-get: #1a73e8;
            --btn-del: #ea4335;
            --status-color: #666;
            --log-bg: #f8f9fa;
            --log-border: #ddd;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --btn-get: #4285f4;
            --btn-del: #d93025;
            --status-color: #aaa;
            --log-bg: #2d2d2d;
            --log-border: #444;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 20px; 
            background: var(--bg-color); 
            color: var(--text-color); 
            transition: background 0.3s, color 0.3s; 
        }

        .card { 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); 
            display: inline-block; 
            max-width: 450px; 
            width: 100%; 
            transition: background 0.3s; 
            position: relative;
        }

        #themeToggle {
            background: none;
            border: 1px solid var(--status-color);
            color: var(--status-color);
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        h1 { margin-bottom: 5px; color: var(--btn-get); font-size: 2.5rem; }
        p { margin-bottom: 20px; }
        
        .btn-group { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        
        button.action-btn { 
            border: none; 
            padding: 18px; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: transform 0.2s, background 0.3s; 
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        button.action-btn:active { transform: scale(0.96); }
        #getBtn { background: var(--btn-get); }
        #delBtn { background: var(--btn-del); }

        #status { margin-top: 25px; font-size: 14px; font-weight: bold; color: var(--status-color); min-height: 20px; }
        
        #log { 
            margin-top: 20px; 
            text-align: left; 
            max-height: 150px; 
            overflow-y: auto; 
            font-family: monospace; 
            font-size: 11px; 
            background: var(--log-bg); 
            border: 1px solid var(--log-border); 
            padding: 10px; 
            border-radius: 8px; 
            display: none; 
            color: var(--text-color);
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="card">
    <button id="themeToggle">🌙 Skift til mørkt tema</button>
    <h1>AirSentinel Pro</h1>
    <p>Web Dashboard</p>
    
    <div class="btn-group">
        <button id="getBtn" class="action-btn">📥 Hent & Gem Data (.csv)</button>
        <button id="delBtn" class="action-btn">🗑️ Slet alt data i huset</button>
    </div>

    <div id="status">Klar til at forbinde...</div>
    <div id="log"></div>
</div>

<script>
    const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
    const DATA_CHAR_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
    const CMD_CHAR_UUID = "cba1d466-344c-4be3-ab3f-189f80dd7518";

    let gattServer = null;
    let cmdChar = null;
    let dataChar = null;
    let csvContent = "PM1.0,PM2.5,PM10\n";

    // MØRKT TEMA LOGIK
    const themeToggle = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('theme') || 'light';
    
    if (savedTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        themeToggle.innerText = '☀️ Skift til lyst tema';
    }

    themeToggle.addEventListener('click', () => {
        let theme = document.documentElement.getAttribute('data-theme');
        if (theme === 'dark') {
            document.documentElement.removeAttribute('data-theme');
            localStorage.setItem('theme', 'light');
            themeToggle.innerText = '🌙 Skift til mørkt tema';
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
            themeToggle.innerText = '☀️ Skift til lyst tema';
        }
    });

    // BLUETOOTH LOGIK
    async function connect() {
        if (gattServer && gattServer.connected) return;
        document.getElementById('status').innerText = "Forbinder til hus...";
        const device = await navigator.bluetooth.requestDevice({
            filters: [{ name: 'AirSentinel_Pro' }],
            optionalServices: [SERVICE_UUID]
        });
        gattServer = await device.gatt.connect();
        const service = await gattServer.getPrimaryService(SERVICE_UUID);
        dataChar = await service.getCharacteristic(DATA_CHAR_UUID);
        cmdChar = await service.getCharacteristic(CMD_CHAR_UUID);
    }

    document.getElementById('getBtn').addEventListener('click', async () => {
        try {
            await connect();
            csvContent = "PM1.0,PM2.5,PM10\n";
            document.getElementById('log').style.display = "block";
            document.getElementById('log').innerText = "";
            document.getElementById('status').innerText = "Modtager data...";

            await dataChar.startNotifications();
            dataChar.addEventListener('characteristicvaluechanged', (event) => {
                let value = new TextDecoder().decode(event.target.value);
                if (value.includes("--- SLUT ---")) {
                    document.getElementById('status').innerText = "Data hentet!";
                    downloadCSV();
                } else {
                    csvContent += value;
                    document.getElementById('log').innerText += value;
                    document.getElementById('log').scrollTop = document.getElementById('log').scrollHeight;
                }
            });

            await cmdChar.writeValue(new TextEncoder().encode("GET"));
        } catch (error) {
            document.getElementById('status').innerText = "Fejl: " + error.message;
        }
    });

    document.getElementById('delBtn').addEventListener('click', async () => {
        if (!confirm("Vil du slette al historik permanent inde i huset?")) return;
        try {
            await connect();
            document.getElementById('status').innerText = "Sender slet-kommando...";
            await cmdChar.writeValue(new TextEncoder().encode("DEL"));
            document.getElementById('status').innerText = "Log slettet i huset! 🗑️";
            setTimeout(() => { document.getElementById('status').innerText = "Klar"; }, 3000);
        } catch (error) {
            document.getElementById('status').innerText = "Fejl ved sletning: " + error.message;
        }
    });

    function downloadCSV() {
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "AirSentinel_Data.csv";
        link.click();
    }
</script>

</body>
</html>

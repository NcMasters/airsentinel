<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirSentinel Data Export</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f9; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; }
        button { background: #007bff; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 18px; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #ccc; }
        #status { margin-top: 20px; color: #555; }
        #log { margin-top: 20px; text-align: left; max-height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px; background: #eee; padding: 10px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1>AirSentinel Pro</h1>
    <p>Eksportér dine luftdata direkte til CSV</p>
    <button id="connectBtn">Hent Data fra Hus</button>
    <div id="status">Klar til forbindelse...</div>
    <div id="log"></div>
</div>

<script>
    const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
    const DATA_CHAR_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
    const CMD_CHAR_UUID = "cba1d466-344c-4be3-ab3f-189f80dd7518";

    let csvContent = "PM1.0,PM2.5,PM10\n";
    let statusDiv = document.getElementById('status');
    let logDiv = document.getElementById('log');

    document.getElementById('connectBtn').addEventListener('click', async () => {
        try {
            statusDiv.innerText = "Søger efter AirSentinel...";
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'AirSentinel_Pro' }],
                optionalServices: [SERVICE_UUID]
            });

            const server = await device.gatt.connect();
            statusDiv.innerText = "Forbundet! Henter tjenester...";
            const service = await server.getPrimaryService(SERVICE_UUID);
            
            const dataChar = await service.getCharacteristic(DATA_CHAR_UUID);
            const cmdChar = await service.getCharacteristic(CMD_CHAR_UUID);

            statusDiv.innerText = "Modtager data...";
            logDiv.style.display = "block";

            // Lyt efter data (Notify)
            await dataChar.startNotifications();
            dataChar.addEventListener('characteristicvaluechanged', (event) => {
                let value = new TextDecoder().decode(event.target.value);
                
                if (value.includes("--- SLUT ---")) {
                    statusDiv.innerText = "Færdig! Downloader fil...";
                    downloadCSV();
                    server.disconnect();
                } else {
                    csvContent += value;
                    logDiv.innerText += value;
                    logDiv.scrollTop = logDiv.scrollHeight;
                }
            });

            // Send GET kommando
            let encoder = new TextEncoder();
            await cmdChar.writeValue(encoder.encode("GET"));

        } catch (error) {
            console.error(error);
            statusDiv.innerText = "Fejl: " + error.message;
        }
    });

    function downloadCSV() {
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", "AirSentinel_Eksport.csv");
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>

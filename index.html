<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirSentinel Pro</title>
    <style>
        :root {--bg:#f0f2f5;--card:white;--text:#333;--get:#1a73e8;--del:#ea4335;--beep:#8b5cf6;}
        [data-theme="dark"] {--bg:#121212;--card:#1e1e1e;--text:#e0e0e0;--get:#4285f4;--del:#d93025;}
        body {font-family:Segoe UI,sans-serif;text-align:center;padding:20px;background:var(--bg);color:var(--text);margin:0;}
        .card {background:var(--card);padding:30px;border-radius:20px;box-shadow:0 10px 25px rgba(0,0,0,0.15);max-width:480px;margin:0 auto;}
        h1 {color:var(--get);margin:0 0 5px;}
        .current {margin:20px 0;padding:20px;border-radius:16px;font-size:1.4rem;font-weight:bold;min-height:80px;}
        .good {background:#4ade80;color:#166534;} .moderate {background:#facc15;color:#854d0e;} .unhealthy {background:#fb923c;color:#9a3412;} .bad {background:#f87171;color:#991b1b;}
        button {padding:18px;border:none;border-radius:12px;font-size:18px;font-weight:bold;color:white;cursor:pointer;margin:8px 0;width:100%;}
        #getBtn {background:var(--get);} #delBtn {background:var(--del);} #currentBtn {background:#10b981;} #beepBtn {background:var(--beep);}
        #status {margin-top:20px;font-weight:bold;min-height:24px;}
        #log {margin-top:15px;text-align:left;max-height:160px;overflow-y:auto;font-family:monospace;font-size:11px;background:#f8f9fa;padding:12px;border-radius:8px;display:none;white-space:pre-wrap;}
    </style>
</head>
<body>
<div class="card">
    <h1>AirSentinel Pro</h1>
    <p>Live Dashboard</p>

    <div id="currentStatus" class="current">Tryk på "Vis nuværende" for at se luftkvalitet</div>

    <div style="display:flex;gap:12px;flex-direction:column;">
        <button id="currentBtn" class="action-btn">📊 Vis nuværende luftkvalitet (live)</button>
        <button id="getBtn" class="action-btn">📥 Hent hele historik (.csv)</button>
        <button id="delBtn" class="action-btn">🗑️ Slet alt data</button>
        <button id="beepBtn" class="action-btn">🔊 Send Test-Bip</button>
    </div>

    <div id="status">Klar til at forbinde...</div>
    <div id="log"></div>
</div>

<script>
const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
const DATA_CHAR_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
const CMD_CHAR_UUID = "cba1d466-344c-4be3-ab3f-189f80dd7518";

let gattServer = null, cmdChar = null, dataChar = null;
let csvContent = "PM1.0,PM2.5,PM10,Battery(mV)\n";

async function connect() {
    if (gattServer?.connected) return;
    document.getElementById('status').innerText = "Forbinder...";
    const device = await navigator.bluetooth.requestDevice({filters:[{name:'AirSentinel_Pro'}], optionalServices:[SERVICE_UUID]});
    gattServer = await device.gatt.connect();
    const service = await gattServer.getPrimaryService(SERVICE_UUID);
    dataChar = await service.getCharacteristic(DATA_CHAR_UUID);
    cmdChar = await service.getCharacteristic(CMD_CHAR_UUID);
}

function showCurrent(line) {
    // Nu griber vi 5 værdier fra linjen i stedet for 4!
    const [pm1,pm25,pm10,batRest,batLoad] = line.trim().split(',').map(Number);
    const vRest = (batRest/1000).toFixed(2);
    const vLoad = (batLoad/1000).toFixed(2);
    
    let status = "", cls = "";
    if(pm25 <= 15) { status = "God luft 💚"; cls = "good"; }
    else if(pm25 <= 35) { status = "Moderat luft 💛"; cls = "moderate"; }
    else if(pm25 <= 75) { status = "Dårlig luft 🟠"; cls = "unhealthy"; }
    else { status = "Meget dårlig! 🔴"; cls = "bad"; }
    
    document.getElementById('currentStatus').innerHTML = `
        <div>PM2.5 = <b>${pm25}</b> µg/m³</div>
        <div style="font-size:0.9rem;margin-top:8px;">${status} • Hvile: ${vRest}V | Pres: ${vLoad}V</div>
    `;
    document.getElementById('currentStatus').className = `current ${cls}`;
}

// ==================== BUTTONS ====================
document.getElementById('currentBtn').addEventListener('click', async () => {
    try {
        await connect();
        document.getElementById('status').innerText = "Henter nuværende værdi...";
        await dataChar.startNotifications();
        const listener = (e) => {
            const val = new TextDecoder().decode(e.target.value);
            if (val.includes(',')) showCurrent(val);
            dataChar.removeEventListener('characteristicvaluechanged', listener);
            document.getElementById('status').innerText = "Nuværende værdi vist!";
        };
        dataChar.addEventListener('characteristicvaluechanged', listener);
        await cmdChar.writeValue(new TextEncoder().encode("CURRENT"));
    } catch(err) { document.getElementById('status').innerText = "Fejl: " + err.message; }
});

document.getElementById('getBtn').addEventListener('click', async () => {
    try {
        await connect();
        csvContent = "PM1.0,PM2.5,PM10,Battery(mV)\n";
        const log = document.getElementById('log');
        log.style.display = "block"; log.innerText = "";
        document.getElementById('status').innerText = "Modtager historik...";
        
        await dataChar.startNotifications();
        const listener = (e) => {
            const val = new TextDecoder().decode(e.target.value);
            if (val.includes("--- SLUT ---")) {
                document.getElementById('status').innerText = "Data hentet!";
                const blob = new Blob([csvContent], {type:'text/csv'});
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "AirSentinel_Data.csv"; a.click();
                dataChar.removeEventListener('characteristicvaluechanged', listener);
            } else {
                csvContent += val;
                log.innerText += val;
                log.scrollTop = log.scrollHeight;
            }
        };
        dataChar.addEventListener('characteristicvaluechanged', listener);
        await cmdChar.writeValue(new TextEncoder().encode("GET"));
    } catch(err) { document.getElementById('status').innerText = "Fejl: " + err.message; }
});

document.getElementById('delBtn').addEventListener('click', async () => {
    if(!confirm("Slet ALT data permanent?")) return;
    try {
        await connect();
        await cmdChar.writeValue(new TextEncoder().encode("DEL"));
        document.getElementById('status').innerText = "Data slettet i huset 🗑️";
        setTimeout(() => document.getElementById('status').innerText = "Klar", 3000);
    } catch(err) { document.getElementById('status').innerText = "Fejl: " + err.message; }
});

// TEST BIP KNAP LOGIK
document.getElementById('beepBtn').addEventListener('click', async () => {
    try {
        await connect();
        await cmdChar.writeValue(new TextEncoder().encode("BEEP"));
        document.getElementById('status').innerText = "Bip sendt! 🔊";
        setTimeout(() => document.getElementById('status').innerText = "Klar", 2000);
    } catch(err) { document.getElementById('status').innerText = "Fejl: " + err.message; }
});
</script>
</body>
</html>

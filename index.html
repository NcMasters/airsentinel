<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirSentinel Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 30px; background: #f0f2f5; color: #333; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: inline-block; max-width: 400px; width: 100%; }
        h1 { margin-bottom: 10px; color: #1a73e8; }
        .btn-group { display: flex; flex-direction: column; gap: 15px; margin-top: 25px; }
        button { border: none; padding: 15px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: transform 0.2s, background 0.3s; }
        button:active { transform: scale(0.98); }
        #getBtn { background: #1a73e8; color: white; }
        #delBtn { background: #ea4335; color: white; }
        #status { margin-top: 20px; font-size: 14px; font-weight: bold; color: #666; }
        #log { margin-top: 20px; text-align: left; max-height: 150px; overflow-y: auto; font-family: monospace; font-size: 11px; background: #f8f9fa; border: 1px solid #ddd; padding: 10px; border-radius: 8px; display: none; }
        .warning { font-size: 12px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h1>AirSentinel Pro</h1>
    <p>Styr dit murstenshus fra mobilen</p>
    
    <div class="btn-group">
        <button id="getBtn">📥 Hent & Gem Data (.csv)</button>
        <button id="delBtn">🗑️ Slet alt data i huset</button>
    </div>

    <div id="status">Klar til at forbinde...</div>
    <div id="log"></div>
    <p class="warning">Husk at Bluetooth skal være tændt på din S23.</p>
</div>

<script>
    const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
    const DATA_CHAR_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
    const CMD_CHAR_UUID = "cba1d466-344c-4be3-ab3f-189f80dd7518";

    let gattServer = null;
    let cmdChar = null;
    let dataChar = null;
    let csvContent = "PM1.0,PM2.5,PM10\n";

    async function connect() {
        if (gattServer && gattServer.connected) return;
        
        document.getElementById('status').innerText = "Forbinder til hus...";
        const device = await navigator.bluetooth.requestDevice({
            filters: [{ name: 'AirSentinel_Pro' }],
            optionalServices: [SERVICE_UUID]
        });

        gattServer = await device.gatt.connect();
        const service = await gattServer.getPrimaryService(SERVICE_UUID);
        dataChar = await service.getCharacteristic(DATA_CHAR_UUID);
        cmdChar = await service.getCharacteristic(CMD_CHAR_UUID);
    }

    // HENT DATA LOGIK
    document.getElementById('getBtn').addEventListener('click', async () => {
        try {
            await connect();
            csvContent = "PM1.0,PM2.5,PM10\n";
            document.getElementById('log').style.display = "block";
            document.getElementById('log').innerText = "";
            document.getElementById('status').innerText = "Modtager data...";

            await dataChar.startNotifications();
            dataChar.addEventListener('characteristicvaluechanged', (event) => {
                let value = new TextDecoder().decode(event.target.value);
                if (value.includes("--- SLUT ---")) {
                    document.getElementById('status').innerText = "Data hentet!";
                    downloadCSV();
                } else {
                    csvContent += value;
                    document.getElementById('log').innerText += value;
                    document.getElementById('log').scrollTop = document.getElementById('log').scrollHeight;
                }
            });

            let encoder = new TextEncoder();
            await cmdChar.writeValue(encoder.encode("GET"));
        } catch (error) {
            document.getElementById('status').innerText = "Fejl: " + error.message;
        }
    });

    // SLET DATA LOGIK
    document.getElementById('delBtn').addEventListener('click', async () => {
        if (!confirm("Er du sikker? Dette sletter AL historik permanent inde i huset!")) return;

        try {
            await connect();
            document.getElementById('status').innerText = "Sender slet-kommando...";
            
            let encoder = new TextEncoder();
            await cmdChar.writeValue(encoder.encode("DEL"));
            
            document.getElementById('status').innerText = "Log slettet i huset! 🗑️";
            setTimeout(() => { document.getElementById('status').innerText = "Klar"; }, 3000);
        } catch (error) {
            document.getElementById('status').innerText = "Fejl ved sletning: " + error.message;
        }
    });

    function downloadCSV() {
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", "AirSentinel_Data.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>
